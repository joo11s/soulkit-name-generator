<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상품명 생성기</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#f4f4f2;color:#1a1a1a;min-height:100vh}
.container{max-width:640px;margin:0 auto;padding:20px 16px 80px}
h1{font-size:18px;font-weight:700;margin-bottom:3px}
.sub{font-size:13px;color:#999;margin-bottom:20px}
.kw-box{border:1.5px solid #ddd;border-radius:14px;background:#fff;padding:12px;min-height:110px;cursor:text;display:flex;flex-wrap:wrap;gap:6px;align-content:flex-start;transition:border .2s}
.kw-box:focus-within{border-color:#888}
.pill{display:inline-flex;align-items:center;gap:4px;background:#f0f0ee;border-radius:20px;padding:5px 11px;font-size:13px;color:#333;white-space:nowrap}
.pill button{background:none;border:none;cursor:pointer;color:#aaa;font-size:17px;line-height:1;padding:0;margin-left:1px}
.pill button:hover{color:#333}
.ghost{border:none;outline:none;font-size:13px;color:#333;background:transparent;min-width:80px;flex:1;padding:4px 2px}
.ghost::placeholder{color:#ccc}
.meta{display:flex;justify-content:space-between;margin-top:7px}
.hint{font-size:12px;color:#bbb}
.count{font-size:12px;color:#bbb}
.count.warn{color:#f59e0b}
.btn-row{display:flex;gap:8px;margin-top:12px}
.btn-gen{flex:1;padding:14px;font-size:15px;font-weight:700;cursor:pointer;border-radius:12px;border:none;background:#1a1a1a;color:#fff;transition:opacity .15s}
.btn-gen:hover{opacity:.82}
.btn-gen:disabled{opacity:.3;cursor:not-allowed}
.btn-clear{padding:14px 18px;font-size:14px;cursor:pointer;border-radius:12px;border:1.5px solid #e0e0e0;background:#fff;color:#888;font-weight:500}
.btn-clear:hover{background:#f5f5f5}
.loading{text-align:center;padding:32px 0 24px;color:#999;font-size:13px}
.pix-wrap{display:inline-flex;align-items:center;gap:12px;background:#f8f8f6;border-radius:12px;padding:12px 16px}
.pix-char-area{display:flex;flex-direction:column;align-items:center;gap:3px}
.pix-lbl{font-size:9px;color:#bbb;font-family:monospace;letter-spacing:1px}
.pix-log-light{background:#fff;border:1.5px solid #eee;border-radius:8px;padding:6px 10px;min-width:150px;height:48px;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;gap:2px}
.pll{font-size:9px;font-family:monospace;animation:logIn .3s ease}
.pll.w{color:#6366f1}.pll.ok{color:#22c55e}.pll.cpc{color:#f59e0b}
@keyframes logIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
.pix-cur{animation:cur .7s infinite}
@keyframes cur{0%,100%{opacity:1}50%{opacity:0}}
.err{font-size:13px;color:#dc2626;padding:14px 16px;background:#fef2f2;border-radius:12px;border:1px solid #fecaca;margin-top:14px}
.classify-card{background:#fff;border:1.5px solid #e8e8e8;border-radius:14px;overflow:hidden;margin-top:16px}
.classify-head{padding:12px 16px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:8px}
.classify-dot{width:8px;height:8px;border-radius:50%;background:#888}
.classify-title{font-size:13px;font-weight:600;flex:1}
.classify-sub{font-size:11px;color:#bbb}
.cl-row{display:flex;align-items:flex-start;gap:8px;padding:9px 16px;border-bottom:1px solid #f5f5f5}
.cl-row:last-child{border-bottom:none}
.cl-label{font-size:11px;font-weight:600;color:#999;min-width:52px;padding-top:5px;flex-shrink:0}
.cl-tags{display:flex;flex-wrap:wrap;gap:5px;flex:1}
.cl-copy{flex-shrink:0;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer;border-radius:6px;border:1.5px solid #e8e8e8;background:#f8f8f8;color:#888;transition:all .15s;white-space:nowrap;align-self:flex-start;margin-top:2px}
.cl-copy:active{transform:scale(.95)}
.cp{display:inline-flex;align-items:center;border-radius:20px;padding:4px 11px;font-size:12px;font-weight:500}
.cp-brand{background:#eaf3de;color:#27500a}
.cp-attr{background:#e6f1fb;color:#0c447c}
.cp-cat{background:#faeeda;color:#633806}
.cp-size{background:#fbeaf0;color:#72243e}
.cp-season{background:#e1f5ee;color:#085041}
.cp-tag{background:#f1efe8;color:#555}
.tabs{display:flex;margin-top:12px;border-radius:14px;overflow:hidden;border:1.5px solid #e8e8e8;background:#f0f0ee}
.tab-btn{flex:1;padding:13px 0;font-size:14px;font-weight:700;cursor:pointer;border:none;background:transparent;color:#aaa;transition:all .2s}
.tab-btn.naver.active{background:#03C75A;color:#fff}
.tab-btn.coupang.active{background:#E4393C;color:#fff}
.result-panel{display:none}
.result-panel.active{display:block}
.result-card{background:#fff;border:1.5px solid #e8e8e8;border-radius:14px;overflow:hidden;margin-top:10px}
.card-head{padding:12px 16px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:8px}
.card-head-dot{width:8px;height:8px;border-radius:50%}
.card-title{font-size:13px;font-weight:600;flex:1}
.card-sub{font-size:11px;color:#bbb}
.name-row{display:flex;align-items:center;gap:8px;padding:13px 16px;border-bottom:1px solid #f7f7f7}
.name-row:last-child{border-bottom:none}
.name-num{font-size:12px;color:#ccc;min-width:16px;flex-shrink:0}
.name-text{flex:1;font-size:14px;color:#1a1a1a;line-height:1.5}
.name-len{font-size:11px;color:#ccc;white-space:nowrap;flex-shrink:0}
.name-len.warn{color:#f59e0b}
.copy-btn{flex-shrink:0;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;border-radius:8px;border:1.5px solid #e8e8e8;background:#f8f8f8;color:#555;transition:all .15s}
.copy-btn:active{transform:scale(.96)}
.tag-area{padding:12px 16px;display:flex;flex-wrap:wrap;gap:6px}
.tag-item{background:#f5f5f3;border-radius:20px;padding:5px 12px;font-size:13px;color:#555;font-weight:500}
.tag-foot{padding:10px 16px;border-top:1px solid #f0f0f0}
.btn-copy-all{padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;border-radius:8px;border:1.5px solid #e0e0e0;background:#fff;color:#555}

/* ── CPC 섹션 ── */
.cpc-section{margin-top:16px}
.cpc-card{background:#fff;border:1.5px solid #e8e8e8;border-radius:14px;overflow:hidden}
.cpc-head{padding:12px 16px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:8px}
.cpc-dot{width:8px;height:8px;border-radius:50%;background:#6366f1}
.cpc-title{font-size:13px;font-weight:600;flex:1}
.cpc-sub{font-size:11px;color:#bbb}
.cpc-kw-area{padding:12px 16px;border-bottom:1px solid #f0f0f0}
.cpc-kw-label{font-size:11px;color:#999;font-weight:600;margin-bottom:8px}
.cpc-kw-grid{display:flex;flex-direction:column;gap:6px}
.cpc-kw-row{display:flex;align-items:center;gap:8px}
.cpc-kw-num{font-size:11px;color:#ccc;min-width:18px}
.cpc-kw-input{flex:1;border:1.5px solid #eee;border-radius:8px;padding:7px 10px;font-size:13px;color:#333;outline:none;transition:border .15s;background:#fafafa}
.cpc-kw-input:focus{border-color:#888;background:#fff}
.cpc-kw-del{background:none;border:none;cursor:pointer;color:#ccc;font-size:16px;padding:0 2px}
.cpc-kw-del:hover{color:#888}
.cpc-kw-add{margin-top:8px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;border-radius:8px;border:1.5px dashed #ddd;background:transparent;color:#aaa;width:100%}
.cpc-kw-add:hover{border-color:#aaa;color:#666}
.cpc-btn-row{padding:12px 16px;border-bottom:1px solid #f0f0f0}
.btn-cpc{width:100%;padding:13px;font-size:14px;font-weight:700;cursor:pointer;border-radius:10px;border:none;background:#6366f1;color:#fff;transition:opacity .15s}
.btn-cpc:hover{opacity:.85}
.btn-cpc:disabled{opacity:.3;cursor:not-allowed}
.cpc-loading{text-align:center;padding:20px 0}

/* CPC 결과 테이블 */
.cpc-result{padding:0}
.cpc-table-wrap{overflow-x:auto;padding:0 0 4px}
table.cpc-tbl{width:100%;border-collapse:collapse;font-size:12px}
table.cpc-tbl th{padding:9px 12px;text-align:left;font-size:11px;font-weight:600;color:#999;background:#fafafa;border-bottom:1px solid #f0f0f0;white-space:nowrap}
table.cpc-tbl td{padding:9px 12px;border-bottom:1px solid #f7f7f7;vertical-align:middle;white-space:nowrap}
table.cpc-tbl tr:last-child td{border-bottom:none}
table.cpc-tbl td:first-child{color:#333;font-weight:600;font-size:13px}
.bid-row td{background:#fff}
.bid-row:hover td{background:#fafafa}
.cpc-zero{color:#ddd}
.cpc-low{color:#22c55e;font-weight:600}
.cpc-mid{color:#f59e0b;font-weight:600}
.cpc-high{color:#ef4444;font-weight:600}
.cpc-kw-name{color:#333;font-size:13px;font-weight:600}
.bid-badge{display:inline-block;padding:2px 7px;border-radius:6px;font-size:11px;font-weight:700;background:#f0f0ee;color:#666}
.no-data{color:#ddd;font-size:11px}

.btn-xl{padding:13px 16px;font-size:13px;font-weight:700;cursor:pointer;border-radius:10px;border:none;background:#16a34a;color:#fff;transition:opacity .15s;white-space:nowrap}
.btn-xl:hover{opacity:.85}
.btn-xl:disabled{opacity:.3;cursor:not-allowed}
  .container{padding:16px 12px 80px}
  .name-text{font-size:13px}
  .copy-btn{padding:8px 12px;font-size:12px}
  .cl-label{min-width:44px}
  table.cpc-tbl th,table.cpc-tbl td{padding:7px 8px}
}
</style>
</head>
<body>
<div class="container">
  <h1>상품명 생성기</h1>
  <p class="sub">키워드 무작위 입력 → 네이버·쿠팡 상품명 + 해시태그 자동 생성</p>
  <div class="kw-box" id="kwBox" onclick="document.getElementById('ghost').focus()">
    <input class="ghost" id="ghost" placeholder="키워드 입력 후 Enter 또는 쉼표 — 붙여넣기도 지원">
  </div>
  <div class="meta">
    <span class="hint">쉼표·줄바꿈 붙여넣기 자동 분리 · 최대 50개</span>
    <span class="count" id="kwCount">0개</span>
  </div>
  <div class="btn-row">
    <button class="btn-gen" id="genBtn" onclick="generate()">상품명 생성</button>
    <button class="btn-clear" onclick="clearAll()">초기화</button>
  </div>
  <div id="output"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<script>
const PROXY = 'https://n8n.wonflowai.com/webhook/product-name-proxy';
const CPC_WEBHOOK = 'https://n8n.wonflowai.com/webhook/naver-cpc-estimate';
const tags = [];
const kwBox = document.getElementById('kwBox');

// 엑셀 다운로드용 데이터 저장
let _resultData = null;
let _cpcData = null;
const ghost = document.getElementById('ghost');

function addTag(v) {
  v = v.trim().replace(/^[,\s]+|[,\s]+$/g, '');
  if (!v || tags.includes(v) || tags.length >= 50) return;
  tags.push(v);
  const p = document.createElement('div');
  p.className = 'pill'; p.dataset.v = v;
  p.innerHTML = `<span>${v}</span><button onclick="removeTag('${v.replace(/'/g, "\\'")}')">×</button>`;
  kwBox.insertBefore(p, ghost);
  updateCount();
}
function addMultiple(text) {
  text.split(/[,\n\r]+/).map(s => s.trim()).filter(Boolean).forEach(addTag);
}
function removeTag(v) {
  const i = tags.indexOf(v); if (i > -1) tags.splice(i, 1);
  const el = kwBox.querySelector(`[data-v="${CSS.escape(v)}"]`); if (el) el.remove();
  updateCount();
}
function updateCount() {
  const el = document.getElementById('kwCount');
  el.textContent = tags.length + '개';
  el.className = 'count' + (tags.length >= 20 ? ' warn' : '');
}
ghost.addEventListener('paste', e => {
  e.preventDefault();
  const text = e.clipboardData.getData('text');
  if (/[,\n\r]/.test(text)) { addMultiple(text); }
  else { ghost.value = text; }
});
ghost.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault(); if (ghost.value.trim()) { addTag(ghost.value); ghost.value = ''; }
  }
  if (e.key === 'Backspace' && !ghost.value && tags.length) removeTag(tags[tags.length - 1]);
});
ghost.addEventListener('blur', () => { if (ghost.value.trim()) { addTag(ghost.value); ghost.value = ''; } });
function clearAll() { [...tags].forEach(removeTag); document.getElementById('output').innerHTML = ''; }

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent; btn.textContent = '✓';
    setTimeout(() => { btn.textContent = orig; }, 1500);
  });
}

async function generate() {
  if (tags.length < 2) { document.getElementById('output').innerHTML = '<p class="err">키워드를 2개 이상 입력해주세요.</p>'; return; }
  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  document.getElementById('output').innerHTML = '<div class="loading">' + pixLoadHtml('gen') + '<div style="margin-top:10px;font-size:12px;color:#999">키워드 분류 후 상품명 조합 중...</div></div>';
  startPixGen();

  const prompt = `당신은 한국 이커머스 상품명 전문가입니다.

입력 키워드 (무작위): ${tags.join(', ')}

=== 1단계: 키워드 분류 ===
- brand: 브랜드명 또는 브랜드 대신 쓸 수식어
- attr: 속성 (가공방식·상태·특징)
- category: 핵심 카테고리명 (1~2개)
- size: 사이즈·용량·수량
- season: 시즌성·용도·상황
- hashtag: 상품명에 못 들어가는 나머지

=== 2단계: 네이버 스마트스토어 상품명 4개 ===
구조: [brand?] + [attr] + [attr] + [category] + [size?] + [season?]
- 네이버 자동표기 제외: 원산지·중량·수량·포장상태는 필드에서 자동 붙음 → 상품명에 넣지 말 것
- 단, 원산지가 차별화 포인트면 속성으로 포함 가능 (예: 제주)
- 금지어: 청정, 최고, 최상, 프리미엄, 특가, 할인, 배송조건
- 중복 의미 단어 하나만 (가시없는/뼈없는 중 택1)
- 4개 각각 키워드 조합·순서·유의어 다르게

=== 3단계: 쿠팡 상품명 4개 ===
구조: [서브키워드1~2] + [category+attr 붙여쓰기] + [size/pack]
- 카테고리명을 앞 키워드와 붙여서 메인키워드 생성 (예: 순살은갈치, 제주갈치)
- 원산지·포장·중량 직접 포함 가능
- 4개 각각 조합 다르게

=== 4단계: 해시태그 ===
- hashtag 분류 키워드 + 상품명에서 빠진 키워드
- 10~15개, #없이 한글 단어만

JSON만 출력:
{"classified":{"brand":[],"attr":[],"category":[],"size":[],"season":[],"hashtag":[]},"naver":["","","",""],"coupang":["","","",""],"tags":[""]}`;

  try {
    const res = await fetch(PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 4096, messages: [{ role: 'user', content: prompt }] })
    });
    const data = await res.json();
    const text = (data.content || []).map(b => b.text || '').join('');
    const raw = (text.match(/\{[\s\S]*\}/) || [])[0] || '';
    if (!raw) throw new Error('응답이 비어있습니다 (' + text.substring(0, 80) + ')');
    let parsed;
    try { parsed = JSON.parse(raw); }
    catch(e) { throw new Error('JSON 파싱 실패. 다시 시도해주세요.'); }
    renderOutput(parsed);
  } catch (e) {
    document.getElementById('output').innerHTML = '<p class="err">오류: ' + e.message + '</p>';
  }
  stopPixGen();
  btn.disabled = false;
}

function renderOutput(d) {
  _resultData = d;
  _cpcData = null;
  const cl = d.classified || {};
  const tm = { brand:'cp-brand', attr:'cp-attr', category:'cp-cat', size:'cp-size', season:'cp-season', hashtag:'cp-tag' };
  const lm = { brand:'브랜드', attr:'속성', category:'카테고리', size:'사이즈', season:'시즌/용도', hashtag:'해시태그용' };

  const clRows = Object.entries(cl).map(([t, ws]) => {
    if (!ws || !ws.length) return '';
    const tagsHtml = ws.map(w => `<span class="cp ${tm[t]}">${w}</span>`).join('');
    const copyVal = ws.join(', ').replace(/'/g, "\\'");
    return `<div class="cl-row">
      <span class="cl-label">${lm[t]}</span>
      <div class="cl-tags">${tagsHtml}</div>
      <button class="cl-copy" onclick="copyText('${copyVal}', this)">복사</button>
    </div>`;
  }).join('');

  const nRows = (d.naver||[]).map((n,i) => `<div class="name-row"><span class="name-num">${i+1}</span><span class="name-text">${n}</span><span class="name-len${n.length>50?' warn':''}">${n.length}자</span><button class="copy-btn" onclick="copyText('${n.replace(/'/g,"\\'")}',this)">복사</button></div>`).join('');
  const cRows = (d.coupang||[]).map((n,i) => `<div class="name-row"><span class="name-num">${i+1}</span><span class="name-text">${n}</span><span class="name-len${n.length>50?' warn':''}">${n.length}자</span><button class="copy-btn" onclick="copyText('${n.replace(/'/g,"\\'")}',this)">복사</button></div>`).join('');
  const tItems = (d.tags||[]).map(t => `<span class="tag-item">${t}</span>`).join('');
  const allTags = (d.tags||[]).join(', ');

  document.getElementById('output').innerHTML = `
    <div class="classify-card">
      <div class="classify-head"><span class="classify-dot"></span><span class="classify-title">키워드 분류</span><span class="classify-sub">AI 자동 분류</span></div>
      ${clRows}
    </div>
    <div class="tabs">
      <button class="tab-btn naver active" onclick="switchTab('naver')">🟢 네이버 스마트스토어</button>
      <button class="tab-btn coupang" onclick="switchTab('coupang')">🔴 쿠팡</button>
    </div>
    <div id="panel-naver" class="result-panel active">
      <div class="result-card">
        <div class="card-head"><span class="card-head-dot" style="background:#03C75A"></span><span class="card-title">네이버 스마트스토어</span><span class="card-sub">브랜드→속성→카테고리→시즌성</span></div>
        ${nRows}
      </div>
    </div>
    <div id="panel-coupang" class="result-panel">
      <div class="result-card">
        <div class="card-head"><span class="card-head-dot" style="background:#E4393C"></span><span class="card-title">쿠팡</span><span class="card-sub">서브키워드→카테고리붙여쓰기→스펙</span></div>
        ${cRows}
      </div>
    </div>
    <div class="result-card" style="margin-top:10px">
      <div class="card-head"><span class="card-head-dot" style="background:#aaa"></span><span class="card-title">해시태그</span><span class="card-sub">상품명 미사용 + 검색 유입용</span></div>
      <div class="tag-area">${tItems}</div>
      <div class="tag-foot"><button class="btn-copy-all" onclick="copyText('${allTags.replace(/'/g,"\\'")}',this)">전체 복사</button></div>
    </div>
    <div class="cpc-section" id="cpcSection">
      <div class="cpc-card">
        <div class="cpc-head">
          <span class="cpc-dot"></span>
          <span class="cpc-title">광고 CPC 분석</span>
          <span class="cpc-sub">입찰가별 예상 노출·클릭·비용</span>

// ── 2차 Claude 호출: 상품명 → 광고 키워드 10개 추출 ──
async function extractCPCKeywords(naverNames) {
  const prompt = `다음 네이버 스마트스토어 상품명 4개에서 네이버 쇼핑 광고에 사용할 검색 키워드 10개를 조합해줘.

상품명:
${naverNames.map((n,i) => `${i+1}. ${n}`).join('\n')}

규칙:
- 상품명 단어들을 조합해서 실제 소비자가 검색할 법한 키워드 만들기
- 단어 붙이기/띄어쓰기 조합 모두 활용 (예: 제주은갈치, 순살 은갈치, 은갈치구이)
- 카테고리 단독, 속성+카테고리, 원산지+카테고리 등 다양하게
- 너무 길거나 특수한 조합 제외
- 절대 띄어쓰기 금지. 모든 키워드 반드시 붙여쓰기 (구운계란O 구운계란30구O / 구운 계란X 구운 계란 30구X)
- 정확히 10개

JSON만 출력: {"keywords":["","","","","","","","","",""]}`;

  try {
    const res = await fetch(PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 512, messages: [{ role: 'user', content: prompt }] })
    });
    const data = await res.json();
    const text = (data.content || []).map(b => b.text || '').join('');
    const raw = (text.match(/\{[\s\S]*\}/) || [])[0] || '';
    const parsed = JSON.parse(raw);
    renderCPCKeywords(parsed.keywords || []);
  } catch(e) {
    document.getElementById('cpcKwGrid').innerHTML = '<p style="font-size:12px;color:#dc2626;padding:8px 0">키워드 추출 실패. 직접 입력해주세요.</p>';
    renderCPCKeywords(['']);
    document.getElementById('cpcBtn').disabled = false;
  }
}

function renderCPCKeywords(keywords) {
  const grid = document.getElementById('cpcKwGrid');
  grid.innerHTML = keywords.map((kw, i) => `
    <div class="cpc-kw-row" id="kwrow-${i}">
      <span class="cpc-kw-num">${i+1}</span>
      <input class="cpc-kw-input" id="cpckw-${i}" value="${kw}" placeholder="키워드 입력">
      <button class="cpc-kw-del" onclick="removeCPCKw(${i})">×</button>
    </div>`).join('') +
    `<button class="cpc-kw-add" onclick="addCPCKw()">+ 키워드 추가</button>`;
  document.getElementById('cpcBtn').disabled = false;
}

function removeCPCKw(i) {
  const el = document.getElementById('kwrow-' + i);
  if (el) el.remove();
}

function addCPCKw() {
  const grid = document.getElementById('cpcKwGrid');
  const addBtn = grid.querySelector('.cpc-kw-add');
  const idx = Date.now();
  const row = document.createElement('div');
  row.className = 'cpc-kw-row';
  row.id = 'kwrow-' + idx;
  row.innerHTML = `<span class="cpc-kw-num">+</span><input class="cpc-kw-input" id="cpckw-${idx}" placeholder="키워드 입력"><button class="cpc-kw-del" onclick="removeCPCKw(${idx})">×</button>`;
  grid.insertBefore(row, addBtn);
}

// ── CPC 조회 ──
async function fetchCPC() {
  const inputs = document.querySelectorAll('.cpc-kw-input');
  const keywords = [...inputs].map(el => el.value.trim().replace(/\s+/g, '')).filter(Boolean);
  if (!keywords.length) return;

  const btn = document.getElementById('cpcBtn');
  btn.disabled = true;
  document.getElementById('cpcResult').innerHTML = '<div class="cpc-loading">' + pixLoadHtml('cpc') + '</div>';
  startPixCpc();

  try {
    // Promise.all로 동시 호출
    const results = await Promise.all(
      keywords.map(kw =>
        fetch(CPC_WEBHOOK, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ keyword: kw })
        }).then(r => r.json()).catch(() => ({ keyword: kw, estimate: [] }))
      )
    );
    renderCPCResult(results);
  } catch(e) {
    document.getElementById('cpcResult').innerHTML = '<p class="err" style="margin:12px 16px">CPC 조회 실패: ' + e.message + '</p>';
  }
  stopPixCpc();
  btn.disabled = false;
}

function renderCPCResult(results) {
  _cpcData = results;
  const xlBtn = document.getElementById('xlBtn');
  if (xlBtn) xlBtn.disabled = false;
  const bids = [50, 70, 100, 150, 200, 300, 500, 700, 1000];

  // 결과를 키워드별로 정리
  const rows = results.map(r => {
    const kw = r.keyword || '';
    const est = Array.isArray(r.estimate) ? r.estimate : [];
    const estMap = {};
    est.forEach(e => { estMap[e.bid] = e; });
    return { kw, estMap };
  });

  // 유효 데이터 있는 결과만 강조
  const hasData = rows.some(r => Object.values(r.estMap).some(e => e.impressions > 0));

  let html = `<div class="cpc-table-wrap"><table class="cpc-tbl">
    <thead><tr>
      <th>키워드</th>
      ${bids.map(b => `<th>${b}원</th>`).join('')}
    </tr></thead><tbody>`;

  rows.forEach(({ kw, estMap }) => {
    html += `<tr class="bid-row"><td class="cpc-kw-name">${kw}</td>`;
    bids.forEach(bid => {
      const e = estMap[bid];
      if (!e || e.impressions === 0) {
        html += `<td class="cpc-zero">-</td>`;
      } else {
        const cpc = e.clicks > 0 ? Math.round(e.cost / e.clicks) : 0;
        const cls = cpc === 0 ? 'cpc-zero' : cpc < 150 ? 'cpc-low' : cpc < 400 ? 'cpc-mid' : 'cpc-high';
        html += `<td>
          <div class="${cls}" style="font-size:12px;font-weight:700">${cpc > 0 ? cpc+'원' : '노출만'}</div>
          <div style="font-size:10px;color:#bbb;margin-top:1px">${e.impressions.toLocaleString()}노출</div>
        </td>`;
      }
    });
    html += `</tr>`;
  });

  html += `</tbody></table></div>
    <div style="padding:10px 16px;font-size:11px;color:#bbb;border-top:1px solid #f0f0f0">
      🟢 저비용 &nbsp; 🟡 중간 &nbsp; 🔴 고비용 &nbsp;·&nbsp; 모바일 기준 · 예상값이므로 참고용으로만 사용
    </div>`;

  document.getElementById('cpcResult').innerHTML = html;
}


// ── 엑셀 다운로드 (xlsx-js-style) ──
function downloadExcel() {
  if (!_resultData || typeof XLSX === 'undefined') {
    alert('잠시 후 다시 시도해주세요.');
    return;
  }
  const d = _resultData;
  const cl = d.classified || {};
  const bids = [50,70,100,150,200,300,500,700,1000];
  const lm = {brand:'브랜드',attr:'속성',category:'카테고리',size:'사이즈',season:'시즌/용도',hashtag:'해시태그용'};
  const clrMap = {brand:'brand',attr:'attr',category:'category',size:'size',season:'season',hashtag:'hashtag'};

  // 색상 팔레트
  const C = {
    sec1:'1a3a6b', sec2:'0f5c2e', sec3:'5c1a6b', sec4:'6b3a00',
    brand:'dbeafe', attr:'dcfce7', category:'fef9c3',
    size:'fce7f3', season:'e0e7ff', hashtag:'f3e8ff',
    naver:'dcfce7', naverH:'bbf7d0',
    coupang:'fee2e2', coupangH:'fecaca',
    subH:'dde3f0',
    cpcH1:'fde68a', cpcH2:'fbbf24',
    cpcLow:'dcfce7', cpcMid:'fef9c3', cpcHigh:'fee2e2', cpcZero:'f3f4f6',
  };

  // 스타일 헬퍼
  function st(fillColor, opts) {
    const s = {};
    if (fillColor) s.fill = {fgColor:{rgb:fillColor}};
    if (opts && opts.bold) s.font = {bold:true, ...(opts.color?{color:{rgb:opts.color}}:{}), ...(opts.sz?{sz:opts.sz}:{})};
    else if (opts && opts.color) s.font = {color:{rgb:opts.color}};
    if (opts && opts.center) s.alignment = {horizontal:'center', vertical:'center', wrapText:!!(opts.wrap)};
    else if (opts && opts.wrap) s.alignment = {wrapText:true, vertical:'top'};
    return s;
  }

  const ws = {};
  const merges = [];
  let ri = 0;

  function sc(r, c, v, style) {
    const addr = XLSX.utils.encode_cell({r, c});
    const t = typeof v === 'number' ? 'n' : 's';
    ws[addr] = {t, v: v ?? '', s: style || {}};
  }
  function mg(r1,c1,r2,c2) { merges.push({s:{r:r1,c:c1},e:{r:r2,c:c2}}); }

  function secH(r, txt, color, endCol) {
    sc(r,0,txt, st(color,{bold:true,color:'ffffff',sz:11,center:true}));
    mg(r,0,r,endCol);
  }

  // ══════════════════════
  // 섹션1: 키워드 분류
  // A=분류, B~I=키워드(병합)
  // ══════════════════════
  secH(ri,'키워드 분류',C.sec1,8); ri++;
  sc(ri,0,'분류', st(C.subH,{bold:true,center:true}));
  sc(ri,1,'키워드', st(C.subH,{bold:true})); mg(ri,1,ri,8); ri++;

  ['brand','attr','category','size','season','hashtag'].forEach(t=>{
    const ws_ = cl[t]||[];
    sc(ri,0, lm[t], st(C[clrMap[t]],{bold:true,center:true}));
    sc(ri,1, ws_.length?ws_.join(', '):'', st(C[clrMap[t]],{wrap:true})); mg(ri,1,ri,8); ri++;
  });
  ri++;

  // ══════════════════════
  // 섹션2: 상품명
  // A=번호, B~D=네이버(병합), E=자, F~H=쿠팡(병합), I=자
  // ══════════════════════
  secH(ri,'상품명',C.sec2,8); ri++;

  sc(ri,0,'번호',       st(C.naverH,{bold:true,center:true}));
  sc(ri,1,'네이버 스마트스토어', st(C.naverH,{bold:true,center:true})); mg(ri,1,ri,3);
  sc(ri,4,'자',         st(C.naverH,{bold:true,center:true}));
  sc(ri,5,'쿠팡',       st(C.coupangH,{bold:true,center:true})); mg(ri,5,ri,7);
  sc(ri,8,'자',         st(C.coupangH,{bold:true,center:true}));
  ri++;

  const maxLen=Math.max((d.naver||[]).length,(d.coupang||[]).length);
  for(let i=0;i<maxLen;i++){
    const n=(d.naver||[])[i]||''; const cp=(d.coupang||[])[i]||'';
    sc(ri,0, i+1,     st('f0fdf4',{center:true}));
    sc(ri,1, n,       st(C.naver,{wrap:true})); mg(ri,1,ri,3);
    sc(ri,4, n.length, st(C.naver,{center:true}));
    sc(ri,5, cp,      st(C.coupang,{wrap:true})); mg(ri,5,ri,7);
    sc(ri,8, cp.length, st(C.coupang,{center:true}));
    ri++;
  }
  ri++;

  // ══════════════════════
  // 섹션3: 해시태그
  // ══════════════════════
  if((d.tags||[]).length){
    secH(ri,'해시태그',C.sec3,8); ri++;
    sc(ri,0,'태그', st('ede9fe',{bold:true,center:true})); mg(ri,0,ri,8); ri++;
    sc(ri,0, d.tags.join(', '), st('f5f3ff',{wrap:true})); mg(ri,0,ri,8); ri++;
    ri++;
  }

  // ══════════════════════
  // 섹션4: CPC (세로배치)
  // A=키워드, B=50CPC, C=50노출, D=70CPC, E=70노출 ...
  // ══════════════════════
  if(_cpcData&&_cpcData.length){
    const cpcEnd = bids.length; // 9열
    secH(ri,'광고 CPC 분석',C.sec4,cpcEnd); ri++;

    // 헤더: 키워드 | 50원 | 70원 | ...
    sc(ri,0,'키워드', st(C.subH,{bold:true,center:true}));
    bids.forEach((b,bi)=>{
      const bg = bi%2===0 ? C.cpcH1 : C.cpcH2;
      sc(ri,bi+1, b+'원', st(bg,{bold:true,center:true}));
    }); ri++;

    _cpcData.forEach(r=>{
      const kw=r.keyword||'';
      const est=Array.isArray(r.estimate)?r.estimate:[];
      const estMap={}; est.forEach(e=>{estMap[e.bid]=e;});
      sc(ri,0,kw,{font:{bold:true}});
      bids.forEach((b,bi)=>{
        const e=estMap[b];
        const noData=!e||e.impressions===0;
        const cpc=noData?null:(e.clicks>0?Math.round(e.cost/e.clicks):0);
        // 텍스트 색상: 저비용=초록, 중간=주황, 고비용=빨강, 없음=회색
        const fc = noData?'999999': cpc===0?'999999': cpc<150?'16a34a': cpc<400?'d97706':'dc2626';
        const val = noData ? '-' : (cpc===0 ? '노출만\n'+e.impressions+'노출' : cpc+'원\n'+e.impressions+'노출');
        sc(ri,bi+1, val, {
          font:{color:{rgb:fc}, bold: !noData && cpc>0},
          alignment:{horizontal:'center', vertical:'center', wrapText:true}
        });
      }); ri++;
    });
  }

  ws['!ref']    = XLSX.utils.encode_range({s:{r:0,c:0},e:{r:ri+1,c:10}});
  ws['!merges'] = merges;
  ws['!cols']   = [
    {wch:14}, // A
    {wch:15}, // B (병합)
    {wch:15}, // C (병합)
    {wch:15}, // D (병합끝)
    {wch:4},  // E 글자수
    {wch:15}, // F (병합)
    {wch:15}, // G (병합)
    {wch:15}, // H (병합끝)
    {wch:4},  // I 글자수
    ...Array(9).fill({wch:11}), // CPC 9열
  ];
  ws['!rows'] = Array(ri+2).fill({hpt:32});

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '상품명분석');
  const now = new Date();
  const ts = `${now.getMonth()+1}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
  XLSX.writeFile(wb, `상품명분석_${ts}.xlsx`);
}

function _drawPix(canvasId, frame, theme) {
  const cv = document.getElementById(canvasId);
  if (!cv) return;
  const ctx = cv.getContext('2d');
  ctx.clearRect(0,0,56,56);
  const isLight = theme === 'light';

  // 책상
  ctx.fillStyle = isLight ? '#d4b896' : '#5c3d1a';
  ctx.fillRect(2,38,52,4);

  // 모니터
  ctx.fillStyle = isLight ? '#e8e8e8' : '#1a1a2e';
  ctx.fillRect(12,12,32,22);
  // 화면
  const s1 = theme==='cpc' ? (frame%2===0?'#f59e0b':'#fbbf24') : (frame%2===0?'#6366f1':'#818cf8');
  const s2 = theme==='cpc' ? '#fde68a' : '#c7d2fe';
  ctx.fillStyle = s1; ctx.fillRect(15,15,18,2);
  ctx.fillStyle = s2; ctx.fillRect(15,19,12,2);
  ctx.fillStyle = frame%3===0?'#22c55e':'#86efac'; ctx.fillRect(15,23,14,2);
  ctx.fillStyle = s2; ctx.fillRect(15,27,8,2);
  // 모니터 받침
  ctx.fillStyle = isLight ? '#e0e0e0' : '#1a1a2e';
  ctx.fillRect(24,32,10,6);
  // 키보드
  ctx.fillStyle = isLight ? '#e8e8e8' : '#2a2a3a';
  ctx.fillRect(16,39,24,3);

  // 몸통
  const bodyC = theme==='cpc' ? '#f59e0b' : '#6366f1';
  ctx.fillStyle = bodyC;
  ctx.fillRect(20,26,10,9);
  // 머리
  const headC = theme==='cpc' ? '#fbbf24' : '#818cf8';
  ctx.fillStyle = headC;
  ctx.fillRect(22,16,10,10);
  // 머리카락
  ctx.fillStyle = isLight ? '#4a3000' : '#1e1b4b';
  ctx.fillRect(22,16,10,3);
  ctx.fillRect(22,16,2,5);
  // 눈
  ctx.fillStyle = '#333';
  if (frame%8 < 7) {
    ctx.fillRect(24,20,2,2); ctx.fillRect(28,20,2,2);
  } else {
    ctx.fillRect(24,21,2,1); ctx.fillRect(28,21,2,1);
  }
  // 팔 타이핑
  ctx.fillStyle = bodyC;
  const ay = frame%4<2 ? 33 : 34;
  ctx.fillRect(14,ay,6,3); ctx.fillRect(30,ay,6,3);
  ctx.fillStyle = headC;
  ctx.fillRect(12,ay+1,3,2); ctx.fillRect(36,ay+1,3,2);
}

}

  _gT = setInterval(()=>{ _gF++; _drawPix('pix-c-gen',_gF,'light'); },150);

}
function stopPixGen() {
  if(_gT){clearInterval(_gT);_gT=null;}

  _addLog('pix-l-gen','ok','> 생성 완료! ✓');
}

function startPixCpc() {
  if (_cT) return;
  _cF=0; _cLi=0;
  setTimeout(()=>{ _drawPix('pix-c-cpc',0,'cpc'); _addLog('pix-l-cpc','cpc','> CPC 조회 시작...'); }, 50);
  _cT = setInterval(()=>{ _cF++; _drawPix('pix-c-cpc',_cF,'cpc'); },150);
  _cLT = setInterval(()=>{ _cLi=(_cLi+1)%_CPC_LOGS.length; const l=_CPC_LOGS[_cLi]; _addLog('pix-l-cpc',l.c,l.m); },1800);
}
function stopPixCpc() {
  if(_cT){clearInterval(_cT);_cT=null;}
  if(_cLT){clearInterval(_cLT);_cLT=null;}
  _addLog('pix-l-cpc','ok','> 조회 완료! ✓');
}
